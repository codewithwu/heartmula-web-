<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartMula - 音乐智能创作平台</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 背景粒子效果 -->
    <canvas id="particleCanvas"></canvas>

    <!-- 背景光晕 -->
    <div class="ambient-glow">
        <div class="glow-orb glow-orb-1"></div>
        <div class="glow-orb glow-orb-2"></div>
        <div class="glow-orb glow-orb-3"></div>
    </div>

    <div class="dashboard">
        <!-- 顶部导航 -->
        <header class="top-nav">
            <div class="logo">
                <span class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M12 6v6l4 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <circle cx="12" cy="12" r="3" fill="currentColor"/>
                    </svg>
                </span>
                <span class="logo-text">HeartMula</span>
            </div>
            <nav class="nav-links">
                <a href="#" class="nav-link active">首页</a>
                <a href="#" class="nav-link">文档</a>
                <a href="#" class="nav-link">关于</a>
            </nav>
        </header>

        <!-- 英雄区域 -->
        <section class="hero">
            <h1 class="hero-title">
                <span class="title-line">音乐智能</span>
                <span class="title-line accent">创作平台</span>
            </h1>
            <p class="hero-subtitle">探索 AI 驱动的音乐创作与处理工具</p>
        </section>

        <!-- 功能卡片网格 -->
        <main class="features-grid">
            <!-- 音频转歌词卡片 -->
            <a href="/static/lyrics.html" class="feature-card" data-feature="lyrics">
                <div class="card-glow"></div>
                <div class="card-icon">
                    <svg viewBox="0 0 48 48" fill="none">
                        <path d="M24 4C12.954 4 4 12.954 4 24s8.954 20 20 20 20-8.954 20-20S35.046 4 24 4z" stroke="currentColor" stroke-width="2"/>
                        <path d="M16 20c0-2 1-4 3-5s3.5-1.5 5-1.5 3 0.5 5 1.5 3 3 3 5v8c0 2-1 4-3 5s-3.5 1.5-5 1.5-3.5 0-5-1.5-3-3-3-5v-8z" stroke="currentColor" stroke-width="2"/>
                        <circle cx="18" cy="22" r="2" fill="currentColor"/>
                        <circle cx="30" cy="22" r="2" fill="currentColor"/>
                        <path d="M18 30c1.5 1 3 1.5 6 1.5s4.5-.5 6-1.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                <h3 class="card-title">音频转歌词</h3>
                <p class="card-desc">上传音频文件，AI 自动识别并提取歌词内容</p>
                <div class="card-status">
                    <span class="status-dot"></span>
                    <span class="status-text">可用</span>
                </div>
                <div class="card-arrow">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </div>
            </a>

            <!-- 音乐生成卡片 (占位，未实现) -->
            <div class="feature-card disabled" data-feature="generate">
                <div class="card-glow"></div>
                <div class="card-icon">
                    <svg viewBox="0 0 48 48" fill="none">
                        <rect x="8" y="8" width="32" height="32" rx="4" stroke="currentColor" stroke-width="2"/>
                        <path d="M18 18v12l10-6-10-6z" fill="currentColor"/>
                    </svg>
                </div>
                <h3 class="card-title">音乐生成</h3>
                <p class="card-desc">输入歌词或标签，AI 创作专属音乐作品</p>
                <div class="card-status coming-soon">
                    <span class="status-dot"></span>
                    <span class="status-text">即将推出</span>
                </div>
                <div class="card-lock">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="5" y="11" width="14" height="10" rx="2"/>
                        <path d="M8 11V7a4 4 0 018 0v4"/>
                    </svg>
                </div>
            </div>

            <!-- 标签推荐卡片 (占位，未实现) -->
            <div class="feature-card disabled" data-feature="tags">
                <div class="card-glow"></div>
                <div class="card-icon">
                    <svg viewBox="0 0 48 48" fill="none">
                        <path d="M8 12h32M8 24h24M8 36h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <circle cx="36" cy="12" r="4" fill="currentColor"/>
                        <circle cx="32" cy="24" r="4" fill="currentColor"/>
                        <circle cx="24" cy="36" r="4" fill="currentColor"/>
                    </svg>
                </div>
                <h3 class="card-title">标签推荐</h3>
                <p class="card-desc">智能分析音乐风格，推荐精准标签组合</p>
                <div class="card-status coming-soon">
                    <span class="status-dot"></span>
                    <span class="status-text">即将推出</span>
                </div>
                <div class="card-lock">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="5" y="11" width="14" height="10" rx="2"/>
                        <path d="M8 11V7a4 4 0 018 0v4"/>
                    </svg>
                </div>
            </div>

            <!-- 更多功能卡片 (扩展占位) -->
            <div class="feature-card placeholder" data-feature="more">
                <div class="card-glow"></div>
                <div class="card-icon">
                    <svg viewBox="0 0 48 48" fill="none">
                        <circle cx="24" cy="24" r="8" stroke="currentColor" stroke-width="2"/>
                        <path d="M24 8v4M24 36v4M8 24h4M36 24h4M12 12l3 3M33 33l3 3M12 36l3-3M33 15l3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                <h3 class="card-title">更多功能</h3>
                <p class="card-desc">持续更新中，敬请期待...</p>
                <div class="card-status coming-soon">
                    <span class="status-dot"></span>
                    <span class="status-text">开发中</span>
                </div>
            </div>
        </main>

        <!-- 底部信息 -->
        <footer class="footer">
            <p class="footer-text">HeartMula — 释放音乐创作的无限可能</p>
            <p class="footer-version">v1.0.0</p>
        </footer>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
