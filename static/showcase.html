<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成品欣赏 - HeartMula</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="/static/showcase.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 背景效果 -->
    <div class="ambient-glow">
        <div class="glow-orb glow-orb-1"></div>
        <div class="glow-orb glow-orb-2"></div>
    </div>

    <div class="page-container">
        <!-- 返回导航 -->
        <header class="page-header">
            <a href="/" class="back-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                <span>返回首页</span>
            </a>
            <div class="page-title">
                <h1>成品欣赏</h1>
                <p class="page-subtitle">AI 创作音乐作品展示</p>
            </div>
        </header>

        <!-- 音频播放器 -->
        <section class="player-section">
            <div class="player-card">
                <div class="player-glow"></div>
                <div class="player-info">
                    <div class="album-art">
                        <svg viewBox="0 0 64 64" fill="none">
                            <circle cx="32" cy="32" r="28" stroke="currentColor" stroke-width="2"/>
                            <circle cx="32" cy="32" r="12" stroke="currentColor" stroke-width="2"/>
                            <circle cx="32" cy="32" r="4" fill="currentColor"/>
                        </svg>
                    </div>
                    <div class="track-info">
                        <h2 class="track-title">晨光旋律</h2>
                        <p class="track-artist">HeartMula AI</p>
                    </div>
                </div>

                <!-- 播放控制 -->
                <div class="player-controls">
                    <div class="progress-container">
                        <span class="time-current" id="currentTime">0:00</span>
                        <div class="progress-bar" id="progressBar">
                            <div class="progress-fill" id="progressFill"></div>
                            <div class="progress-thumb" id="progressThumb"></div>
                        </div>
                        <span class="time-total" id="totalTime">0:00</span>
                    </div>

                    <div class="controls-row">
                        <button class="btn-play" id="playBtn">
                            <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M8 5v14l11-7z"/>
                            </svg>
                            <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" hidden>
                                <rect x="6" y="4" width="4" height="16"/>
                                <rect x="14" y="4" width="4" height="16"/>
                            </svg>
                        </button>

                        <div class="volume-control">
                            <svg class="icon-volume" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M11 5L6 9H2v6h4l5 4V5z"/>
                                <path d="M15.54 8.46a5 5 0 010 7.07"/>
                            </svg>
                            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80">
                        </div>
                    </div>
                </div>

                <audio id="audioPlayer" src="/example/output.mp3"></audio>
            </div>
        </section>

        <!-- 歌词展示 -->
        <section class="lyrics-section">
            <div class="lyrics-header">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 18V5l12-2v13"/>
                    <circle cx="6" cy="18" r="3"/>
                    <circle cx="18" cy="16" r="3"/>
                </svg>
                <h2>歌词</h2>
            </div>
            <div class="lyrics-box">
                <pre class="lyrics-content" id="lyricsContent">加载中...</pre>
            </div>
        </section>
    </div>

    <script src="/static/showcase.js"></script>
</body>
</html>
