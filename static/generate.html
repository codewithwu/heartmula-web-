<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐生成 - HeartMula</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="/static/generate.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 背景效果 -->
    <div class="ambient-glow">
        <div class="glow-orb glow-orb-1"></div>
        <div class="glow-orb glow-orb-2"></div>
    </div>

    <div class="page-container">
        <!-- 返回导航 -->
        <header class="page-header">
            <a href="/" class="back-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                <span>返回首页</span>
            </a>
            <div class="page-title">
                <h1>音乐生成</h1>
                <p class="page-subtitle">输入歌词，选择风格标签，AI 创作专属音乐</p>
            </div>
        </header>

        <!-- 生成表单 -->
        <main class="generate-section">
            <!-- 歌词输入 -->
            <div class="input-group">
                <label class="input-label">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 18V5l12-2v13"/>
                        <circle cx="6" cy="18" r="3"/>
                        <circle cx="18" cy="16" r="3"/>
                    </svg>
                    <span>歌词内容</span>
                </label>
                <textarea
                    id="lyricsInput"
                    class="lyrics-textarea"
                    placeholder="请输入歌词内容，每句歌词用换行分隔..."
                    rows="8"
                ></textarea>
                <div class="input-hint">支持多段歌词，请用空行分隔不同段落</div>
            </div>

            <!-- 标签选择 -->
            <div class="input-group">
                <label class="input-label">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/>
                        <line x1="7" y1="7" x2="7.01" y2="7"/>
                    </svg>
                    <span>风格标签</span>
                </label>
                <div id="tagCategories" class="tag-categories">
                    <!-- 动态渲染 -->
                </div>
                <div class="selection-summary" id="selectionSummary">
                    <span class="summary-label">已选择：</span>
                    <span id="summaryText" class="summary-text">未选择任何标签</span>
                </div>
            </div>

            <!-- 生成按钮 -->
            <button id="generateBtn" class="btn-generate" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="5,3 19,12 5,21"/>
                </svg>
                <span>生成音乐</span>
            </button>

            <!-- 进度显示 -->
            <div class="progress-container" id="progressContainer" hidden>
                <div class="progress-header">
                    <div class="progress-status">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 18V5l12-2v13"/>
                            <circle cx="6" cy="18" r="3"/>
                            <circle cx="18" cy="16" r="3"/>
                        </svg>
                        <span id="progressLabel">准备生成...</span>
                    </div>
                    <span class="progress-percent" id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p class="progress-hint" id="progressHint">正在连接服务器...</p>
            </div>

            <!-- 成功提示 -->
            <div class="success-container" id="successContainer" hidden>
                <div class="success-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 12l2 2 4-4"/>
                        <circle cx="12" cy="12" r="10"/>
                    </svg>
                </div>
                <p class="success-message">音乐生成成功！</p>
                <p class="success-hint">文件已开始下载</p>
                <button class="btn-reset" id="resetBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12a9 9 0 109-9 9.75 9.75 0 00-6.74 2.74L3 8"/>
                        <path d="M3 3v5h5"/>
                    </svg>
                    生成新音乐
                </button>
            </div>

            <!-- 错误提示 -->
            <div class="error-container" id="errorContainer" hidden>
                <div class="error-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="15" y1="9" x2="9" y2="15"/>
                        <line x1="9" y1="9" x2="15" y2="15"/>
                    </svg>
                </div>
                <p class="error-message" id="errorMessage"></p>
                <button class="btn-retry" id="retryBtn">重新生成</button>
            </div>
        </main>
    </div>

    <script src="/static/generate.js"></script>
</body>
</html>
