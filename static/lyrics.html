<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音频转歌词 - HeartMula</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="/static/lyrics.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 背景效果 -->
    <div class="ambient-glow">
        <div class="glow-orb glow-orb-1"></div>
        <div class="glow-orb glow-orb-2"></div>
    </div>

    <div class="page-container">
        <!-- 返回导航 -->
        <header class="page-header">
            <a href="/" class="back-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                <span>返回首页</span>
            </a>
            <div class="page-title">
                <h1>音频转歌词</h1>
                <p class="page-subtitle">AI 智能识别音频中的歌词内容</p>
            </div>
        </header>

        <!-- 上传区域 -->
        <main class="upload-section">
            <div class="upload-area" id="uploadArea">
                <div class="upload-glow"></div>
                <div class="upload-content">
                    <div class="upload-icon">
                        <svg viewBox="0 0 64 64" fill="none">
                            <circle cx="32" cy="32" r="28" stroke="currentColor" stroke-width="2" stroke-dasharray="4 4"/>
                            <path d="M32 20v24M20 32h24" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <p class="upload-text">拖拽音频文件到此处</p>
                    <p class="upload-hint">或点击选择文件</p>
                    <div class="upload-formats">
                        <span class="format-tag">MP3</span>
                        <span class="format-tag">WAV</span>
                        <span class="format-tag">M4A</span>
                    </div>
                </div>
                <input type="file" id="fileInput" accept=".mp3,.wav,.m4a,audio/*" hidden>
            </div>

            <!-- 上传进度 -->
            <div class="progress-container" id="progressContainer" hidden>
                <div class="progress-header">
                    <div class="progress-file">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 18V5l12-2v13"/>
                            <circle cx="6" cy="18" r="3"/>
                            <circle cx="18" cy="16" r="3"/>
                        </svg>
                        <span id="fileName">audio.mp3</span>
                    </div>
                    <span class="progress-percent" id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p class="progress-hint" id="progressHint">准备上传...</p>
            </div>

            <!-- 结果展示 -->
            <div class="result-container" id="resultContainer" hidden>
                <div class="result-header">
                    <div class="result-title-row">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 12l2 2 4-4"/>
                            <circle cx="12" cy="12" r="10"/>
                        </svg>
                        <h2>转录完成</h2>
                    </div>
                    <button class="btn-download" id="downloadBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                            <polyline points="7,10 12,15 17,10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        下载歌词
                    </button>
                </div>
                <div class="lyrics-box">
                    <pre class="lyrics-content" id="lyricsContent"></pre>
                </div>
                <button class="btn-reset" id="resetBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12a9 9 0 109-9 9.75 9.75 0 00-6.74 2.74L3 8"/>
                        <path d="M3 3v5h5"/>
                    </svg>
                    处理新文件
                </button>
            </div>

            <!-- 错误提示 -->
            <div class="error-container" id="errorContainer" hidden>
                <div class="error-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="15" y1="9" x2="9" y2="15"/>
                        <line x1="9" y1="9" x2="15" y2="15"/>
                    </svg>
                </div>
                <p class="error-message" id="errorMessage"></p>
                <button class="btn-retry" id="retryBtn">重新上传</button>
            </div>
        </main>
    </div>

    <script src="/static/lyrics.js"></script>
</body>
</html>
